<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="./style.css">
    <script defer src="./script.js"></script>
</head>
<body>
    <p>Rock, paper, scissors (also known as Rochambeau, Roshambo, or Janken) 
        is a fun, easy game anyone can learn and enjoy. 
        Here, it's Rock Paper Scissors vs computer. First to 5 wins. </p>
    <p>You need <span id="pts-left">5</span> points to win.</p>
    <div id="rps-buttons">
        <button id="rock">Rock</button>
        <button id="paper">Paper</button>
        <button id="scissors">Scissors</button>
    </div>
    <div id="display-results">
        <div id="results"></div>
        <div id="score"></div>
    </div>
</body>
</html>
